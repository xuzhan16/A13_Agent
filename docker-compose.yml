version: "3.9"

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: career-planning-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      # 如果不需要 APOC，这三行删除；如果需要 APOC，请按官方文档挂载插件
      # NEO4J_dbms_security_procedures_unrestricted: apoc.*
      # NEO4J_apoc_export_file_enabled: "true"
      # NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j:/init
    healthcheck:
      test: ["CMD-SHELL", "/var/lib/neo4j/bin/cypher-shell -u neo4j -p password 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  neo4j-init:
    image: neo4j:5.15-community
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./neo4j:/init
    entrypoint:
      - /bin/bash
      - -lc
      - cypher-shell -a bolt://neo4j:7687 -u neo4j -p password -d neo4j -f /init/init.cypher
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs: